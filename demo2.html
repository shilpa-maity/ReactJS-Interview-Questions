<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table example</title>
    <style type="text/css">
        table {
             text-align: center;
             font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
        table tbody>tr:hover{
            transition: all 0.7s ease-in-out;
            background-color: rgb(215, 231, 177);
            color:#fff;
            box-shadow: 6px 6px 6px #54c9dd;
        }
        div {

            border:1px solid #2d7cc2;
            width:30%;
            float:left;
            margin-left:20px;
        }
        div>header{
            background-color:rgb(159, 208, 220);
            padding:12px;
            color:#fff;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
        <header>
            <h4>My Friend Details : TOP TABLE:</h4>
        </header>
    <!--TOP or DataGridView -> multiple records of the same time-->
       <table border="2px" cellspacing="5px" cellpadding="5px" bgcolor=" #e8f8f5
" bordercolor="brown"  width="100%">
        <thead>
            <tr>
                 <th>ID:</th>
                 <th>Name:</th>
                 <th>Address:</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>101</td>
                <td>Gechu</td>
                <td>Kolkata</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Bheem</td>
                <td>Dholokpur</td>
            </tr>
            <tr>
                <td>103</td>
                <td>Chutki</td>
                <td>Dholokpur</td>
            </tr>
            <tr>
                <td>104</td>
                <td>Raju</td>
                <td>Dholokpur</td>
            </tr>
        </tbody>
        <tfoot>
              <tr>
                <td colspan="3">
                    <span>CopyRight &copy; Mine-2025</span>
                </td>
                 
              </tr>

        </tfoot>
       </table>
       </div>
       <div>
       <header>
        <h4>My Details: LEFT TABLE:</h4>
       </header>
       <table border="2px" cellspacing="5px" cellpadding="5px" bordercolor="brown" bgcolor=" #9ff9f9" width="100%">
        <tfoot>
            <tr>
                <td colspan="2">CopyRight &copy; Mine-2025</td>
            </tr>
        </tfoot>
        <tbody>
        <tr>
            <th>ID:</th>
            <td>01</td>
        </tr>
        <tr>
            <th>NAME:</th>
            <td>Shilpa</td>
        </tr>
        <tr>
            <th>ADDRESS:</th>
            <td>Japan</td>
        </tr>
        </tbody>
        
       </table>
       </div>
</body>
</html>
