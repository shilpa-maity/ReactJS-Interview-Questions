<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POST API </title>
    <!--Add Bootstrap-4 CDN-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <!--Add Bootstrap-4 JS CDN-->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>

    <script type="text/javascript">
           const POST_API_URL="https://jsonplaceholder.typicode.com/posts";
           const USER_API_URL="https://jsonplaceholder.typicode.com/users";
           const getUser = async(userId)=>{
            try{
                let response = await fetch(USER_API_URL);
                let userData = await response.json();
                let selectedUser= userData.find((userObj)=> userObj.id ==userId);
                return selectedUser; 
            }
            catch(error){
                throw error;
            }
            }
           const  getAllPosts=async()=>{
            try{            
            let response = await fetch(POST_API_URL);
                         let postData = await response.json();
                         //console.log(postData);
                         return postData;
            }
            catch(error){
                throw error;
            }
                        }
            function loadPosts(){
            //console.log("Hello world");
                      const posts =  getAllPosts();
                      posts.then((postData)=>{
                        console.log(postData);
                        var strContent=`
                        <table class="table table-hover">
                            <tr>
                                <th>View</th>
                                <th>UserId:</th>
                                <th>Title:</th>
                                <th>Description:</th>
                            </tr>
                        `;
                        for(let post of postData){
                               strContent+=`
                               <tr>
                                <td><input type='radio' value="${post.userId}" onchange="showUser(this.value)" name='r1'/></td>
                                
                                <td>${post.userId}</td>
                                <td>${post.title}</td>
                                <td>${post.body}</td>
                                </tr>
                               `;
                        } 
                           strContent+=`</table>`;
                           document.getElementById("d1").innerHTML=strContent;
                      }).catch((error)=>{
                        console.log(error);
                      })
           }

            function showUser(userId){
                   console.log(userId);
                   var data= getUser(userId);
                   console.log(data);
                   data.then((userData)=>{
                    console.log(userData);
                    alert("Post is written by "+userData.name+"\n Registered Email :"+userData.email+"\n Nick Name :"+userData.username);
                   }).catch((error)=>{
                    console.log(error);
                   }) 
            }
    </script>
</head>
<body>
    <header class="modal-header">
        <h1>Displaying all Posts :</h1>
    </header>
    <div class="container-fluid" align="center">
        <button class="btn btn-sm btn-outline-primary mt-3" onclick="loadPosts()">Load All Posts :</button>
        <div id="d1" class="container"></div>
    </div>
        
</body>
</html>
